<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stelios Prentakis</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="Personal website of Stelios Prentakis — undergraduate researcher with interests in theoretical computer science, computational complexity, and quantum computing." />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Stelios Prentakis</a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
    <nav class="site-nav" id="site-nav">
      <a href="index.html" aria-current="page">Home</a>
      <a href="cv.html">CV</a>
      <a href="updates.html">Projects</a>
      <a href="tutoring.html">Tutoring</a>
    </nav>
  </header>

  <main>
    <section class="home-hero">
      <div class="home-hero-inner">
        <div class="home-hero-photo">
          <img class="avatar" src="assets/profile.png" alt="Stelios Prentakis" />
        </div>
        <div class="home-hero-text">
          <h1 class="page-title">Stelios Prentakis</h1>
          <p class="home-affiliation">National Technical University of Athens</p>
          <p class="home-bio" id="home-bio"></p>
          <div class="home-links" id="home-links"></div>
        </div>
      </div>
    </section>

    <section class="section reveal">
      <header class="section-head">
        <h2>News</h2>
      </header>
      <div class="news-list" id="news-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Stelios Prentakis</p>
  </footer>

  <script src="main.js"></script>
  <script>
    async function loadHomeData() {
      try {
        const [cvRes, updatesRes] = await Promise.all([
          fetch('data/cv.json'),
          fetch('data/updates.json')
        ]);
        const cv = await cvRes.json();
        const updates = await updatesRes.json();

        document.getElementById('home-bio').textContent = cv.about;

        const linksEl = document.getElementById('home-links');
        linksEl.innerHTML = cv.contacts.map(c =>
          `<a href="${c.url}" class="home-contact-link">${c.label}</a>`
        ).join('');

        const newsEl = document.getElementById('news-list');
        const recent = updates.updates.slice(0, 4);
        newsEl.innerHTML = recent.map(u => {
          const date = new Date(u.date);
          const formatted = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          return `<div class="news-item"><time datetime="${u.date}">${formatted}</time><span>${u.text}</span></div>`;
        }).join('');

        observeReveals();
      } catch (err) {
        console.error('Failed to load home data:', err);
      }
    }
    loadHomeData();
  </script>
</body>
</html>
