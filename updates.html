<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Projects — Stelios Prentakis</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="Research projects by Stelios Prentakis" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Stelios Prentakis</a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
    <nav class="site-nav" id="site-nav">
      <a href="index.html">Home</a>
      <a href="cv.html">CV</a>
      <a href="updates.html" aria-current="page">Projects</a>
      <a href="tutoring.html">Tutoring</a>
    </nav>
  </header>

  <main>
    <!-- Projects -->
    <section class="section reveal">
      <header class="section-head">
        <h2>Projects</h2>
      </header>

      <div class="filters" role="group" aria-label="Filter projects" id="project-filters">
        <button class="chip" data-filter="all" aria-pressed="true">All</button>
      </div>

      <div class="project-grid" id="projects-container"></div>
    </section>

    <!-- Publications -->
    <section class="section reveal">
      <header class="section-head">
        <h2>Publications</h2>
      </header>
      <div id="publications-container">
        <p class="empty-state">Publications coming soon (hopefully). Check back later!</p>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Stelios Prentakis</p>
  </footer>

  <script src="main.js"></script>
  <script>
    // Load and render projects from JSON
    async function loadProjects() {
      try {
        const response = await fetch('data/projects.json');
        const data = await response.json();
        const container = document.getElementById('projects-container');
        const filtersContainer = document.getElementById('project-filters');

        // Get unique tags and create filter buttons
        const allTags = new Set();
        data.projects.forEach(p => p.tags.forEach(t => allTags.add(t)));

        allTags.forEach(tag => {
          const btn = document.createElement('button');
          btn.className = 'chip';
          btn.dataset.filter = tag;
          btn.setAttribute('aria-pressed', 'false');
          btn.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
          filtersContainer.appendChild(btn);
        });

        // Render projects
        container.innerHTML = data.projects.map(project => {
          const tagsAttr = project.tags.join(' ');
          const linkHtml = project.link ? `<div class="links"><a href="${project.link}">${project.linkText || 'Learn more &rarr;'}</a></div>` : '';
          return `
            <article class="project card lift" data-tags="${tagsAttr}">
              <h3>${project.title}</h3>
              <p>${project.description}</p>
              ${linkHtml}
            </article>
          `;
        }).join('');

        setupFilters();
      } catch (err) {
        console.error('Failed to load projects:', err);
      }
    }

    // Load publications
    async function loadPublications() {
      try {
        const response = await fetch('data/publications.json');
        const data = await response.json();
        const container = document.getElementById('publications-container');

        if (data.publications && data.publications.length > 0) {
          container.innerHTML = data.publications.map(pub => {
            const linkHtml = pub.link ? `<a href="${pub.link}" class="pub-link">${pub.linkText || 'View'}</a>` : '';
            return `
              <article class="pub-item card">
                <h3 class="pub-title">${pub.title}</h3>
                <p class="pub-authors">${pub.authors || ''}</p>
                <p class="pub-venue">${pub.venue || ''} ${pub.year ? '(' + pub.year + ')' : ''}</p>
                ${linkHtml}
              </article>
            `;
          }).join('');
        }
      } catch (err) {
        console.error('Failed to load publications:', err);
      }
    }

    function setupFilters() {
      const chips = document.querySelectorAll('.filters .chip');
      const cards = document.querySelectorAll('.project-grid .project');
      chips.forEach(ch => ch.addEventListener('click', () => {
        chips.forEach(c => c.setAttribute('aria-pressed', 'false'));
        ch.setAttribute('aria-pressed', 'true');
        const tag = ch.dataset.filter;
        cards.forEach(card => {
          const tags = (card.dataset.tags || '').split(' ');
          card.style.display = (tag === 'all' || tags.includes(tag)) ? '' : 'none';
        });
      }));
    }

    loadProjects();
    loadPublications();
  </script>
</body>
</html>
